{% extends 'base.html' %}

{% block head %}
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank You</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #f5f6fa;
    font-family: 'Lato', sans-serif;
    color: #333;
  }

  .welcome-wrapper {
    width: 90%;
    max-width: 720px;
    margin: 3rem auto 4rem;
  }

  .welcome-title {
    font-size: 2.4rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.75rem;
    color: #222;
  }

  .welcome-subtitle {
    text-align: center;
    font-size: 1.05rem;
    color: #555;
    margin-bottom: 2rem;
  }

  .welcome-section {
    background: #fff;
    border: 1px solid #dde1e7;
    border-radius: 10px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
  }

  .welcome-section h2 {
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 1rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 0.6rem;
  }

  .welcome-section .content-area {
    min-height: 80px;
    color: #888;
    font-style: italic;
    font-size: 0.95rem;
  }

  .content-area code {
    background: #f0f4ff;
    color: #2563eb;
    padding: 0.1em 0.4em;
    border-radius: 4px;
    font-size: 0.92em;
    font-family: monospace;
  }

  .question-text {
    font-style: normal;
    color: #333;
    margin-bottom: 0.85rem;
    font-size: 0.97rem;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .choice-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-style: normal;
    color: #444;
    cursor: pointer;
    font-size: 0.97rem;
  }

  .choice-label input[type="radio"] {
    width: 16px;
    height: 16px;
    accent-color: #2563eb;
    cursor: pointer;
    flex-shrink: 0;
  }

  .go-btn {
    display: block;
    width: 100%;
    padding: 0.85rem;
    border: none;
    border-radius: 8px;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: not-allowed;
    background-color: #b0bec5;
    color: #fff;
    margin-top: 2rem;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .go-btn.enabled {
    background-color: #2563eb;
    cursor: pointer;
  }

  .go-btn.enabled:hover {
    background-color: #1d4ed8;
  }

  .go-btn.enabled:active {
    transform: scale(0.98);
  }
</style>
{% endblock %}

{% block body %}
<div class="welcome-wrapper">
  <h1 class="welcome-title">Thank You!</h1>
  <p class="welcome-subtitle">Thank you for your participation. Before you log out, please complete the ending questionnaire below.</p>

  <div class="welcome-section">
    <h2>Ending Questionnaire</h2>
    <div class="content-area">
      <p class="question-text">Q1: Add your question in the file <code>ending.html</code>!</p>
      <div class="choices">
        <label class="choice-label">
          <input type="radio" name="eq1" value="1"> Choice 1
        </label>
        <label class="choice-label">
          <input type="radio" name="eq1" value="2"> Choice 2
        </label>
      </div>
    </div>
  </div>

  <button class="go-btn" id="submit-btn" disabled>Submit &amp; Finish</button>
</div>

<script>
  const radios = document.querySelectorAll('input[type="radio"]');
  const submitBtn = document.getElementById('submit-btn');

  function checkAllAnswered() {
    // Get all unique question names
    const names = [...new Set([...radios].map(r => r.name))];
    // Check that at least one radio in each group is selected
    const allAnswered = names.every(name =>
      document.querySelector(`input[name="${name}"]:checked`)
    );
    if (allAnswered) {
      submitBtn.disabled = false;
      submitBtn.classList.add('enabled');
    } else {
      submitBtn.disabled = true;
      submitBtn.classList.remove('enabled');
    }
  }

  radios.forEach(r => r.addEventListener('change', checkAllAnswered));

  submitBtn.addEventListener('click', async function () {
    if (submitBtn.disabled) return;

    // Collect all radio answers
    const responses = {};
    document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
      responses[r.name] = r.value;
    });

    // POST to backend before navigating
    try {
      await fetch('/submit_questionnaire', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionnaire: 'ending',
          responses,
          currentTimestamp: new Date().toISOString()
        })
      });
    } catch (e) {
      console.error('Failed to save questionnaire responses:', e);
    }

    // Clear session storage since the study is complete
    sessionStorage.clear();
    window.location.href = '/done';
  });
</script>
{% endblock %}
