{% extends 'base.html' %}

{% block head %}
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #f5f6fa;
    font-family: 'Lato', sans-serif;
    color: #333;
  }

  .welcome-wrapper {
    width: 90%;
    max-width: 720px;
    margin: 3rem auto 4rem;
  }

  .welcome-title {
    font-size: 2.4rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    color: #222;
  }

  .welcome-section {
    background: #fff;
    border: 1px solid #dde1e7;
    border-radius: 10px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
  }

  .welcome-section h2 {
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 1rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 0.6rem;
  }

  .welcome-section .content-area {
    min-height: 80px;
    color: #888;
    font-style: italic;
    font-size: 0.95rem;
  }

  .content-area code {
    background: #f0f4ff;
    color: #2563eb;
    padding: 0.1em 0.4em;
    border-radius: 4px;
    font-size: 0.92em;
    font-family: monospace;
  }

  .question-text {
    font-style: normal;
    color: #333;
    margin-bottom: 0.85rem;
    font-size: 0.97rem;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .choice-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-style: normal;
    color: #444;
    cursor: pointer;
    font-size: 0.97rem;
  }

  .choice-label input[type="radio"] {
    width: 16px;
    height: 16px;
    accent-color: #2563eb;
    cursor: pointer;
    flex-shrink: 0;
  }

  .consent-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.25rem;
  }

  .consent-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #2563eb;
    flex-shrink: 0;
  }

  .consent-row label {
    font-size: 1rem;
    cursor: pointer;
    color: #333;
    user-select: none;
  }

  .go-btn {
    display: block;
    width: 100%;
    padding: 0.85rem;
    border: none;
    border-radius: 8px;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: not-allowed;
    background-color: #b0bec5;
    color: #fff;
    margin-top: 2rem;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .go-btn.enabled {
    background-color: #2563eb;
    cursor: pointer;
  }

  .go-btn.enabled:hover {
    background-color: #1d4ed8;
  }

  .go-btn.enabled:active {
    transform: scale(0.98);
  }
</style>
{% endblock %}

{% block body %}
<div class="welcome-wrapper">
  <h1 class="welcome-title">Welcome!</h1>

  <div class="welcome-section">
    <h2>Introduction</h2>
    <div class="content-area">Add your project introduction in the file <code>welcome.html</code>!</div>
  </div>

  <div class="welcome-section">
    <h2>Beginning Questionnaire</h2>
    <div class="content-area">
      <p class="question-text">Q1: Add your question in the file <code>welcome.html</code>!</p>
      <div class="choices">
        <label class="choice-label">
          <input type="radio" name="q1" value="1"> Choice 1
        </label>
        <label class="choice-label">
          <input type="radio" name="q1" value="2"> Choice 2
        </label>
      </div>
    </div>
  </div>

  <div class="welcome-section">
    <div class="consent-row">
      <input type="checkbox" id="consent-checkbox">
      <label for="consent-checkbox">I consent to participate in this experiment.</label>
    </div>
  </div>

  <button class="go-btn" id="go-btn" disabled>GO!</button>
</div>

<script>
  const checkbox = document.getElementById('consent-checkbox');
  const goBtn = document.getElementById('go-btn');

  checkbox.addEventListener('change', function () {
    if (this.checked) {
      goBtn.disabled = false;
      goBtn.classList.add('enabled');
    } else {
      goBtn.disabled = true;
      goBtn.classList.remove('enabled');
    }
  });

  goBtn.addEventListener('click', function () {
    if (!goBtn.disabled) {
      window.location.href = '/trajectory-summary';
    }
  });
// Save and restore questionnaire answers across navigation
const q1Radios = document.querySelectorAll('input[name="q1"]');
  const consentBox = document.getElementById('consent-checkbox');

  // Restore saved answers
  const savedQ1 = sessionStorage.getItem('welcome_q1');
  if (savedQ1) {
    q1Radios.forEach(r => { if (r.value === savedQ1) r.checked = true; });
  }
  if (sessionStorage.getItem('welcome_consent') === 'true') {
    consentBox.checked = true;
    goBtn.disabled = false;
    goBtn.classList.add('enabled');
  }

  // Save on change
  q1Radios.forEach(r => {
    r.addEventListener('change', function () {
      sessionStorage.setItem('welcome_q1', this.value);
    });
  });
  consentBox.addEventListener('change', function () {
    sessionStorage.setItem('welcome_consent', this.checked);
  });
  
</script>
{% endblock %}
